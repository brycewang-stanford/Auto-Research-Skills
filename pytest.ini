[pytest]
# This repository vendors many third-party projects as git submodules under
# skills/, systems/, benchmarks/, and lists/. Those projects ship their own
# test suites that depend on packages we deliberately do not install, so a bare
# `pytest` run from the repo root would try to collect them and fail with
# hundreds of import errors (see `make check`).
#
# Restrict collection to this repo's own tests. `testpaths` is used when pytest
# is invoked with no path arguments (as `make test` does); `norecursedirs`
# additionally guards against accidental collection if a broader path is passed.
testpaths = tests
norecursedirs = skills systems benchmarks lists site catalog assets .git
